---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: perkasm-frontend
  namespace: perkasm
  labels:
    app: perkasm-frontend
    component: frontend
  annotations:
    # Cert Manager for SSL/TLS
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    
    # Nginx Ingress Controller annotations
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    
    # CORS (if needed for cross-origin API calls)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://perkasm.com"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: SAMEORIGIN";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: geolocation=(), microphone=(), camera=()";
    
    # Client body size
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    
    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    
    # Enable ModSecurity WAF (if available)
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
    
    # Rewrite rules for SPA routing (if needed)
    nginx.ingress.kubernetes.io/rewrite-target: /

spec:
  ingressClassName: nginx
  
  tls:
  - hosts:
    - perkasm.com
    - www.perkasm.com
    secretName: perkasm-frontend-tls
  
  rules:
  # Main domain
  - host: perkasm.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: perkasm-frontend
            port:
              name: http
  
  # WWW redirect
  - host: www.perkasm.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: perkasm-frontend
            port:
              name: http

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: perkasm-frontend-staging
  namespace: perkasm
  labels:
    app: perkasm-frontend
    component: frontend
    environment: staging
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    
    # Basic auth for staging (optional)
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: basic-auth
    nginx.ingress.kubernetes.io/auth-realm: 'Authentication Required - Staging Environment'

spec:
  ingressClassName: nginx
  
  tls:
  - hosts:
    - staging.perkasm.com
    secretName: perkasm-frontend-staging-tls
  
  rules:
  - host: staging.perkasm.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: perkasm-frontend
            port:
              name: http

---
# Network Policy to restrict traffic (optional, for enhanced security)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: perkasm-frontend-netpol
  namespace: perkasm
  labels:
    app: perkasm-frontend
    component: frontend
spec:
  podSelector:
    matchLabels:
      app: perkasm-frontend
      component: frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  # Allow outbound HTTPS for external APIs
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 443
  # Allow outbound HTTP for external APIs
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 80
