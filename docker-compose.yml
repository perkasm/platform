
services:
  postgres:
    image: pgvector/pgvector:pg17-trixie
    container_name: perkasm-postgres
    environment:
      POSTGRES_DB: perkasm
      POSTGRES_USER: perkasm
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perkasm -d perkasm -h localhost"]
      interval: 60s
      timeout: 5s
      retries: 5
    networks:
      - perkasm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8001}
        VITE_ENVIRONMENT: ${VITE_ENVIRONMENT:-production}
    container_name: perkasm-frontend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - perkasm-network

volumes:
  postgres_data:

networks:
  perkasm-network:
    driver: bridge