version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: perkasm-postgres
    environment:
      POSTGRES_DB: perkasm
      POSTGRES_USER: perkasm
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perkasm -d perkasm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: